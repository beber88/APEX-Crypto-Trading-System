services:

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: apex_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: apex_db
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apex_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  trading_bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: apex_bot
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - MEXC_API_KEY=${MEXC_API_KEY}
      - MEXC_SECRET_KEY=${MEXC_SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
    volumes:
      - ./apex_crypto/config:/app/apex_crypto/config
      - ./data:/app/data
      - ./reports:/app/reports
      - ./ml/models:/app/ml/models
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: apex_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: apex_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"

volumes:
  timescaledb_data:
  redis_data:
  prometheus_data:
  grafana_data:
