global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "apex_trading_bot"
    static_configs:
      - targets: ["trading_bot:8000"]
    metrics_path: "/api/metrics"
    scrape_interval: 10s

  - job_name: "timescaledb"
    static_configs:
      - targets: ["timescaledb:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
